name: Daily data ingest

# Pulls fresh papers into Supabase every morning (China time). arXiv first,
# then OpenAlex for the non-CS categories. Both steps upsert idempotently,
# so a manual re-run is always safe.
on:
  schedule:
    # 22:00 UTC == 06:00 Asia/Shanghai — content is ready before people wake up.
    - cron: "0 22 * * *"
  workflow_dispatch: {}

concurrency:
  group: daily-ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      # Optional — falls back to gpt-4o-mini inside the scripts if unset.
      OPENAI_MODEL_LOW_COST: ${{ secrets.OPENAI_MODEL_LOW_COST }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Ingest arXiv papers (daily)
        run: npm run ingest:papers -- --mode daily

      - name: Ingest OpenAlex works
        run: npx tsx scripts/ingest-openalex.ts
