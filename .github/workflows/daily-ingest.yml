name: Daily data ingest

# Pulls fresh content into Supabase every morning (China time) from 6
# independent sources (arXiv, PubMed, OWID, OpenAlex, NASA APOD, OWID
# grapher). All steps upsert idempotently, so a manual re-run is safe, and
# each step has continue-on-error so one source's failure can't skip the rest.
on:
  schedule:
    # 22:00 UTC == 06:00 Asia/Shanghai — content is ready before people wake up.
    - cron: "0 22 * * *"
  workflow_dispatch: {}

concurrency:
  group: daily-ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      # Optional — falls back to gpt-4o-mini inside the scripts if unset.
      OPENAI_MODEL_LOW_COST: ${{ secrets.OPENAI_MODEL_LOW_COST }}
      # Optional — falls back to DEMO_KEY if unset (rate-limited to ~30 req/hr).
      NASA_API_KEY: ${{ secrets.NASA_API_KEY }}
      # Optional — falls back to keyless PubMed E-utilities (3 req/s) if unset.
      NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # continue-on-error on every step below: these 6 sources are independent
      # of each other. Without this, one source throwing (a transient API
      # error, a rate limit) makes GitHub Actions skip every step after it —
      # silently zeroing out unrelated pipelines for the whole day. A step
      # failure still shows red in the Actions UI; it just no longer blocks
      # its siblings.
      - name: Ingest arXiv papers (daily)
        run: npm run ingest:papers -- --mode daily
        continue-on-error: true

      - name: Ingest PubMed high-impact journals (daily)
        run: npx tsx scripts/ingest-pubmed.ts
        continue-on-error: true

      - name: Ingest Our World in Data insights
        run: npx tsx scripts/ingest-owid.ts
        continue-on-error: true

      - name: Ingest OpenAlex works (Climate-only)
        run: npx tsx scripts/ingest-openalex.ts
        continue-on-error: true

      - name: Ingest NASA APOD (daily, space domain)
        run: npx tsx scripts/ingest-apod.ts
        continue-on-error: true

      # Idempotent on source_id — daily reruns skip existing facts (zero LLM
      # cost) and only pick up rows when OWID publishes new data years.
      - name: Ingest OWID grapher trend facts
        run: npx tsx scripts/ingest-owid-grapher.ts
        continue-on-error: true

  # Wikidata evergreen backfill — one-shot, run manually via workflow_dispatch.
  # Not included in the daily chain (CC0 facts don't change daily).
  ingest-wikidata:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    timeout-minutes: 30
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL_LOW_COST: ${{ secrets.OPENAI_MODEL_LOW_COST }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Ingest Wikidata SPARQL facts (evergreen backfill)
        run: npx tsx scripts/ingest-wikidata.ts
